<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bukber Yuk</title>

<style>

body{
margin:0;
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#333;
overflow:hidden;
}

/* container */

.card{
background:white;
width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
animation:fade 0.6s;
}

.hidden{
display:none;
}

h1{
margin-top:0;
font-size:24px;
}

p{
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.next{
background:#ff4d6d;
color:white;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#eee;
position:absolute;
width:120px;
}

/* pilihan tempat */

.place{
background:#f4f4f4;
margin-top:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.place:hover{
background:#ffe4e8;
}

/* countdown */

.countdown{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:18px;
animation:float 6s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="card" id="page1">

<h1>Hai kamu 😊</h1>

<p>Ada sesuatu yang ingin aku tanyakan...</p>

<div class="countdown" id="countdown"></div>

<button class="next" onclick="nextPage()">Next</button>

</div>

<div class="card hidden" id="page2">

<h1>Mau ikut bukber denganku? 🌙</h1>

<button class="yes" onclick="showPlace()">Iya dong ❤️</button>

<button class="no" id="noBtn">Tidak 😅</button>

</div>

<div class="card hidden" id="page3">

<h1>Pilih tempat bukber</h1>

<div class="place" onclick="sendWA('Ra Cha Mall Panakkukang')">
🍲 Ra Cha Mall Panakkukang
</div>

<div class="place" onclick="sendWA('Pocha 1998 CPI')">
🍗 Pocha 1998 CPI
</div>

</div>

<script>

/* NEXT PAGE */

function nextPage(){
document.getElementById("page1").classList.add("hidden")
document.getElementById("page2").classList.remove("hidden")
}

/* YES */

function showPlace(){
document.getElementById("page2").classList.add("hidden")
document.getElementById("page3").classList.remove("hidden")
}

/* tombol tidak kabur */

let no=document.getElementById("noBtn")
let scale=1

no.addEventListener("mouseover",()=>{

let x=Math.random()*300
let y=Math.random()*400

no.style.left=x+"px"
no.style.top=y+"px"

scale-=0.1

if(scale>0.3){
no.style.transform="scale("+scale+")"
}

})

/* KIRIM WHATSAPP */

function sendWA(place){

let nomor="6281234567890" // GANTI NOMOR

let pesan="Aku mau ikut bukber di "+place+" 😆"

window.open(
"https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan),
"_blank"
)

}

/* COUNTDOWN */

let targetDate = new Date("March 20, 2026 18:00:00").getTime()

let countdown=setInterval(()=>{

let now=new Date().getTime()

let distance=targetDate-now

let days=Math.floor(distance/(1000*60*60*24))
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes=Math.floor((distance%(1000*60*60))/(1000*60))

document.getElementById("countdown").innerHTML =
"Menuju Bukber: "+days+"h "+hours+"j "+minutes+"m"

},1000)

/* floating hearts */

for(let i=0;i<20;i++){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(heart)

}

</script>

</body>
</html>
