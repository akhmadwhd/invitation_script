<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bukber Yuk</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow:hidden;
color:white;
}

.container{
margin-top:150px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:#333;
position:absolute;
}

.hidden{
display:none;
}

h1{
font-size:40px;
}

p{
font-size:20px;
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation: float 6s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

/* confetti canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container" id="page1">

<h1>Haloo Princess Alisaa 😊</h1>
<p>Ada sesuatu yang ingin aku tanyakan...</p>

<button onclick="nextPage()">Next</button>

</div>

<div class="container hidden" id="page2">

<h1>Apakah kamu mau ikut bukber denganku? 🌙</h1>

<button id="yes" onclick="accept()">Iya dong ❤️</button>
<button id="no">Tidak 😅</button>

</div>

<div class="container hidden" id="page3">

<h1>Yeay! 🎉</h1>
<p>Berarti kita jadi bukber ya!</p>
<p>Nanti aku kabarin tempat dan waktunya 😆</p>

</div>

<script>

/* next page */

function nextPage(){
document.getElementById("page1").classList.add("hidden")
document.getElementById("page2").classList.remove("hidden")
}

/* tombol tidak kabur + mengecil */

let noBtn = document.getElementById("no")
let size = 1

noBtn.addEventListener("mouseover",function(){

let x = Math.random() * window.innerWidth
let y = Math.random() * window.innerHeight

noBtn.style.left = x+"px"
noBtn.style.top = y+"px"

size = size - 0.1

if(size > 0.3){
noBtn.style.transform = "scale("+size+")"
}

})

/* klik iya */

function accept(){

document.getElementById("page2").classList.add("hidden")
document.getElementById("page3").classList.remove("hidden")

startConfetti()

sendWhatsApp()

}

/* kirim whatsapp */

function sendWhatsApp(){

let nomor = "6285266667541" // GANTI NOMOR KAMU

let pesan = "Ayomii bukber sayangggkuuuu😆"

setTimeout(()=>{

window.open(
"https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan),
"_blank"
)

},1500)

}

/* hearts animation */

for(let i=0;i<20;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.bottom="-20px"
heart.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(heart)

}

/* confetti */

function startConfetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+4,
d:Math.random()*150
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

for(let i=0;i<pieces.length;i++){

let p=pieces[i]

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true)
ctx.fill()

}

update()

}

function update(){

for(let i=0;i<pieces.length;i++){

let p=pieces[i]

p.y += Math.cos(p.d)+2
p.x += Math.sin(p.d)

if(p.y>canvas.height){
p.y=0
}

}

}

setInterval(draw,20)

}

</script>

</body>
</html>
